<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>因果ループ図エディタ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Meiryo', 'Segoe UI', sans-serif; background: #f5f0eb; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* App header */
.app-header { display: flex; align-items: center; gap: 12px; padding: 7px 16px; background: #2a1e15; flex-shrink: 0; }
.app-title { color: #d4b896; font-size: 14px; font-weight: 700; flex: 1; letter-spacing: 0.03em; }
.hbtn { padding: 4px 14px; border: 1px solid #7c5c3e; border-radius: 5px; cursor: pointer; font-size: 12px; background: #3d2b1f; color: #d4b896; transition: all 0.15s; }
.hbtn:hover { background: #5a3e28; color: #fff; }

/* Tabs */
.tabs { display: flex; background: #3d2b1f; padding: 0 16px; gap: 4px; align-items: flex-end; flex-shrink: 0; }
.tab { padding: 9px 22px; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 600; color: #bbb; background: #2a1e15; transition: all 0.2s; user-select: none; }
.tab.active { background: #f5f0eb; color: #3d2b1f; }
.tab:hover:not(.active) { background: #4a3525; color: #fff; }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: #fff; border-bottom: 1px solid #e0d8d0; flex-shrink: 0; flex-wrap: wrap; }
.btn { padding: 5px 12px; border: 1px solid #d0c8c0; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 500; background: #f8f4f0; color: #444; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: #ede5dc; border-color: #b8a898; }
.btn.primary { background: #7c5c3e; color: #fff; border-color: #5a3e28; }
.btn.primary:hover { background: #5a3e28; }
.btn.active-state { background: #f0d8d0 !important; border-color: #c08070 !important; }
.sep { width: 1px; height: 22px; background: #ddd; margin: 0 3px; flex-shrink: 0; }
.hint { font-size: 11px; color: #999; margin-left: auto; }

/* Views */
.view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

/* Elements View */
.editor-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
.line-nums { width: 54px; background: #ede5dc; border-right: 2px solid #d4c4b4; padding: 8px 0; font-family: monospace; font-size: 12px; line-height: 22px; color: #a08060; overflow: hidden; user-select: none; flex-shrink: 0; }
.line-nums .ln { height: 22px; text-align: right; padding-right: 6px; display: flex; align-items: center; justify-content: flex-end; gap: 2px; }
.line-nums .ln.locked { background: #d8c8b8; color: #7c5030; }
.line-nums .ln.locked::before { content: '🔒'; font-size: 9px; }
.editor-ta { flex: 1; padding: 8px 12px; font-family: monospace; font-size: 13px; line-height: 22px; border: none; outline: none; resize: none; background: #fffdf9; color: #333; }
.lock-notice { padding: 5px 14px; background: #fef5e8; border-top: 1px solid #e8d4b0; border-bottom: 1px solid #e8d4b0; font-size: 11px; color: #8b5e2a; display: none; flex-shrink: 0; }
.lock-notice.show { display: block; }
.conn-panel { border-top: 2px solid #c8a882; background: #faf5ee; padding: 8px 14px; max-height: 160px; overflow-y: auto; flex-shrink: 0; }
.conn-panel-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.conn-panel h3 { font-size: 12px; color: #7c5c3e; font-weight: 700; }
.conn-list { list-style: none; font-size: 12px; color: #555; line-height: 1.8; }

/* Canvas Views */
.canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #fffdf9; }
canvas { position: absolute; top: 0; left: 0; display: block; }

/* Popups */
.popup { position: absolute; background: #fff; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); padding: 5px; display: none; gap: 5px; z-index: 200; }
.popup.show { display: flex; }
.popup-btn { width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 13px; background: #f8f4f0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.popup-btn:hover { background: #ede5dc; }
.popup-btn.del:hover { background: #f0d0d0; border-color: #c08080; }
.popup-btn.on { background: #fde8d8 !important; border-color: #e09060 !important; }

/* Loop editor panel */
.loop-panel { position: absolute; top: 12px; left: 12px; background: #fff; border: 1px solid #c8a882; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 14px; display: none; z-index: 200; width: 220px; }
.loop-panel.show { display: block; }
.loop-panel h4 { font-size: 13px; color: #5a3e28; margin-bottom: 10px; }
.loop-panel label { font-size: 11px; color: #888; display: block; margin-top: 8px; margin-bottom: 2px; }
.loop-panel input[type=range] { width: 100%; accent-color: #7c5c3e; }
.loop-panel .close-btn { width: 100%; margin-top: 10px; }
</style>
</head>
<body>

<!-- App header -->
<div class="app-header">
  <div class="app-title">因果ループ図エディタ</div>
  <button class="hbtn" onclick="saveProject()">💾 保存</button>
  <button class="hbtn" onclick="document.getElementById('loadInput').click()">📂 ロード</button>
  <input type="file" id="loadInput" accept=".json" style="display:none" onchange="onLoadFile(this)">
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-view="elements" onclick="switchView('elements')">① 要素</div>
  <div class="tab" data-view="correlation" onclick="switchView('correlation')">② 相関</div>
  <div class="tab" data-view="chain" onclick="switchView('chain')">③ 連鎖</div>
</div>

<!-- ① 要素 View -->
<div class="view active" id="view-elements">
  <div class="toolbar">
    <button class="btn" onclick="doUndo()">↩ 元に戻す</button>
    <button class="btn" onclick="doCopy()">コピー</button>
    <button class="btn" onclick="doPaste()">貼り付け</button>
    <div class="sep"></div>
    <button class="btn" onclick="deleteLine()">行削除</button>
    <button class="btn" onclick="moveLine(-1)">↑ 上へ</button>
    <button class="btn" onclick="moveLine(1)">↓ 下へ</button>
    <div class="sep"></div>
    <button class="btn primary" onclick="switchView('correlation')">相関へ →</button>
  </div>
  <div class="lock-notice" id="lockNotice">🔒 行1〜<span id="lockCount"></span> は固定済みです（接続設定あり）。新しい要素は末尾に追加してください。</div>
  <div class="editor-wrap">
    <div class="line-nums" id="lineNums"></div>
    <textarea class="editor-ta" id="editorTA" spellcheck="false"
      placeholder="要素を1行ずつ入力&#10;例：人口&#10;出生率&#10;食料資源"
      oninput="onEditorInput()" onscroll="syncLineNumScroll()"
      onkeydown="onEditorKeyDown(event)"></textarea>
  </div>
  <div class="conn-panel">
    <div class="conn-panel-hdr">
      <h3>接続情報</h3>
      <button class="btn" style="font-size:11px;padding:3px 9px" onclick="copyConnText()">📋 コピー</button>
    </div>
    <ul class="conn-list" id="connList"><li style="color:#bbb">相関viewでリンクを結ぶと表示されます</li></ul>
  </div>
</div>

<!-- ② 相関 View -->
<div class="view" id="view-correlation">
  <div class="toolbar">
    <button class="btn" onclick="autoLayout()">⟳ 自動配置</button>
    <button class="btn" onclick="copyCanvasImg('corrCanvas')">🖼 画像コピー</button>
    <div class="sep"></div>
    <button class="btn primary" onclick="switchView('chain')">連鎖へ →</button>
    <span class="hint">ノード移動: ドラッグ / リサイズ: 右下角 / リンク作成: ●ハンドルからドラッグ / リンク付け替え: 矢印端●をドラッグ</span>
  </div>
  <div class="canvas-wrap" id="corrWrap">
    <canvas id="corrCanvas"></canvas>
    <div class="popup" id="linkPopup">
      <div class="popup-btn del" title="リンク削除" onclick="deleteLink()">✕</div>
      <div class="popup-btn" id="invertBtn" title="反転（NOT）" onclick="toggleInvert()">⊿○</div>
      <div class="popup-btn" id="delayBtn" title="遅延（コンデンサ）" onclick="toggleDelay()">⊣⊢</div>
    </div>
  </div>
</div>

<!-- ③ 連鎖 View -->
<div class="view" id="view-chain">
  <div class="toolbar">
    <button class="btn primary" onclick="analyzeLoops()">🔍 自動解析</button>
    <button class="btn" onclick="addAnnotation()">✏ テキスト追加</button>
    <button class="btn" onclick="copyChainImg()">🖼 画像コピー</button>
    <span class="hint">強化ループ(R)=暖色 / 均衡ループ(B)=寒色 | ループ円をクリックしてサイズ・太さを編集</span>
  </div>
  <div class="canvas-wrap" id="chainWrap">
    <canvas id="chainBaseCanvas"></canvas>
    <canvas id="chainEditCanvas"></canvas>
    <div class="popup" id="annotPopup">
      <div class="popup-btn del" title="テキスト削除" onclick="deleteAnnotation()">✕</div>
    </div>
    <div class="loop-panel" id="loopPanel">
      <h4 id="loopPanelTitle">ループ</h4>
      <div id="loopNodeList" style="margin-bottom:8px;font-size:11px;color:#555;line-height:1.7;background:#faf5ee;border-radius:5px;padding:6px 8px;max-height:110px;overflow-y:auto;"></div>
      <label>サイズ（半径）</label>
      <input type="range" id="sizeSlider" min="20" max="500" oninput="updateLoopParam('radius', this.value)">
      <label>太さ</label>
      <input type="range" id="thickSlider" min="4" max="80" oninput="updateLoopParam('thickness', this.value)">
      <div style="display:flex;gap:6px;margin-top:10px;">
        <button class="btn" id="faintBtn" style="flex:1;font-size:11px" onclick="toggleLoopFaint()">👻 薄く表示</button>
        <button class="btn close-btn" style="flex:1;font-size:11px" onclick="closeLoopPanel()">✕ 閉じる</button>
      </div>
    </div>
  </div>
</div>

<script>
// =====================================================
// STATE
// =====================================================
let nodes   = [];
let links   = [];
let loops   = [];
let annots  = [];
let uid = 1;

// Editor
let hist = [''], histIdx = 0;
let lockedCount   = 0;   // 0 = not yet visited correlation
let prevLineCount = 0;

// Correlation interaction
const ci = {
  drag: null,      // {node, ox, oy}
  resize: null,    // {node, ox, oy, ow, oh}
  linkDraw: null,  // {fromId, fromSide, mx, my}
  relink: null,    // {link, end:'from'|'to', mx, my}
  hoverLink: null,
  selLink: null,
  mx: 0, my: 0,
};

// Chain interaction
const chi = {
  selLoop: null,
  selAnnot: null,
  dragAnnot: null,
  mx: 0, my: 0,
};

const WARM = ['rgba(210,70,20,0.4)', 'rgba(230,140,0,0.4)', 'rgba(200,50,50,0.4)', 'rgba(180,90,10,0.4)'];
const COOL = ['rgba(30,110,210,0.4)', 'rgba(20,160,180,0.4)', 'rgba(60,100,200,0.4)', 'rgba(0,140,120,0.4)'];

// =====================================================
// SAVE / LOAD
// =====================================================
function saveProject() {
  const name = prompt('保存ファイル名を入力してください（拡張子 .json は自動付与）:', 'causal-loop');
  if (!name) return;
  const data = {
    version: 1,
    editorText: ta.value,
    lockedCount,
    nodes: nodes.map(n => ({ ...n })),
    links: links.map(l => ({ ...l })),
    loops: loops.map(l => ({ ...l, links: undefined })), // exclude link refs
    annots: annots.map(a => ({ ...a })),
    uid,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name.replace(/\.json$/i, '') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function onLoadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      ta.value = data.editorText || '';
      lockedCount = data.lockedCount || 0;
      prevLineCount = ta.value.split('\n').length;
      nodes = data.nodes || [];
      links = data.links || [];
      loops = (data.loops || []).map(l => ({ ...l }));
      annots = data.annots || [];
      uid = data.uid || uid;
      hist = [ta.value]; histIdx = 0;
      updateLineNums();
      renderConnList();
      updateLockNotice();
      alert('ロードしました: ' + file.name);
    } catch (err) {
      alert('ファイルの読み込みに失敗しました。\n' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// =====================================================
// VIEW SWITCHING
// =====================================================
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`.tab[data-view="${name}"]`).classList.add('active');

  if (name === 'correlation') {
    // Lock lines on first visit
    if (lockedCount === 0 && ta.value.trim()) {
      lockedCount = ta.value.split('\n').length;
      prevLineCount = lockedCount;
      updateLockNotice();
    }
    syncEditorToNodes();
    requestAnimationFrame(() => { resizeCorrCanvas(); drawCorr(); });

  } else if (name === 'chain') {
    syncEditorToNodes();
    requestAnimationFrame(() => { resizeChainCanvas(); drawChainBase(); drawChainEdit(); });

  } else {
    updateLineNums();
    renderConnList();
  }
}

// =====================================================
// ELEMENTS VIEW
// =====================================================
const ta = document.getElementById('editorTA');
const lnDiv = document.getElementById('lineNums');

function getLines() { return ta.value.split('\n'); }

function updateLineNums() {
  const lines = getLines();
  lnDiv.innerHTML = lines.map((_, i) => {
    const locked = lockedCount > 0 && i < lockedCount;
    return `<div class="ln${locked ? ' locked' : ''}">${i + 1}</div>`;
  }).join('');
}

function updateLockNotice() {
  const notice = document.getElementById('lockNotice');
  if (lockedCount > 0) {
    notice.classList.add('show');
    document.getElementById('lockCount').textContent = lockedCount + '行';
  } else {
    notice.classList.remove('show');
  }
}

function syncLineNumScroll() { lnDiv.scrollTop = ta.scrollTop; }

function onEditorInput() {
  const lines = getLines();
  const newCount = lines.length;

  if (lockedCount > 0 && newCount !== prevLineCount) {
    const cursorLine = ta.value.slice(0, ta.selectionStart).split('\n').length - 1;
    if (cursorLine < lockedCount) {
      // Change in locked section
      const ok = confirm(
        '末尾に行を追加してください。\n' +
        '途中に行を追加・削除した場合、相関viewの接続関係はリセットします。\n\n' +
        'OK → 接続をリセットして続行\nキャンセル → 変更を元に戻す'
      );
      if (ok) {
        links = []; loops = [];
        lockedCount = newCount;
        updateLockNotice();
      } else {
        ta.value = hist[histIdx];
        updateLineNums();
        return;
      }
    }
  }

  prevLineCount = newCount;
  updateLineNums();
  pushHist();
  syncEditorToNodes();
  renderConnList();
}

function pushHist() {
  hist = hist.slice(0, histIdx + 1);
  hist.push(ta.value);
  histIdx++;
  if (hist.length > 100) { hist.shift(); histIdx--; }
}

function doUndo() {
  if (histIdx > 0) {
    histIdx--;
    ta.value = hist[histIdx];
    prevLineCount = ta.value.split('\n').length;
    updateLineNums();
    syncEditorToNodes();
    renderConnList();
  }
}

function doCopy() {
  const s = ta.selectionStart, e = ta.selectionEnd;
  navigator.clipboard.writeText(s !== e ? ta.value.slice(s, e) : ta.value);
}

async function doPaste() {
  const txt = await navigator.clipboard.readText();
  const s = ta.selectionStart, e = ta.selectionEnd;
  ta.value = ta.value.slice(0, s) + txt + ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s + txt.length;
  onEditorInput();
}

function getSelLineIdx() {
  return ta.value.slice(0, ta.selectionStart).split('\n').length - 1;
}

function deleteLine() {
  const lines = getLines(), idx = getSelLineIdx();
  if (lockedCount > 0 && idx < lockedCount) {
    alert('固定済みの行は削除できません。');
    return;
  }
  remapLinksOnDelete(idx);
  if (lines.length === 1) ta.value = '';
  else { lines.splice(idx, 1); ta.value = lines.join('\n'); }
  prevLineCount = ta.value.split('\n').length;
  pushHist(); updateLineNums(); syncEditorToNodes(); renderConnList();
}

function moveLine(dir) {
  const lines = getLines(), idx = getSelLineIdx(), tgt = idx + dir;
  if (tgt < 0 || tgt >= lines.length) return;
  if (lockedCount > 0 && (idx < lockedCount || tgt < lockedCount)) {
    alert('固定済みの行は移動できません。');
    return;
  }
  [lines[idx], lines[tgt]] = [lines[tgt], lines[idx]];
  remapLinksOnSwap(idx, tgt);
  ta.value = lines.join('\n');
  prevLineCount = ta.value.split('\n').length;
  pushHist(); updateLineNums(); syncEditorToNodes(); renderConnList();
}

function remapLinksOnDelete(delIdx) {
  links = links.filter(l => l.fromId !== delIdx && l.toId !== delIdx);
  links.forEach(l => {
    if (l.fromId > delIdx) l.fromId--;
    if (l.toId > delIdx) l.toId--;
  });
}

function remapLinksOnSwap(a, b) {
  links.forEach(l => {
    if (l.fromId === a) l.fromId = b; else if (l.fromId === b) l.fromId = a;
    if (l.toId === a)   l.toId = b;   else if (l.toId === b)   l.toId = a;
  });
}

function onEditorKeyDown(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); doUndo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c') { e.preventDefault(); doCopy(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'v') { e.preventDefault(); doPaste(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = ta.selectionStart;
    ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
    onEditorInput();
  }
}

function syncEditorToNodes() {
  const lines = ta.value.split('\n');
  const newCount = lines.length;
  if (nodes.length > newCount) {
    links = links.filter(l => l.fromId < newCount && l.toId < newCount);
    nodes.length = newCount;
  }
  lines.forEach((line, i) => {
    const textW = Math.max(100, line.length * 13 + 28);
    if (!nodes[i]) {
      nodes[i] = { id: i, text: line, x: 80 + (i % 4) * 200, y: 80 + Math.floor(i / 4) * 130, w: textW, h: 46 };
    } else {
      nodes[i].text = line;
      nodes[i].id = i;
      if (textW > nodes[i].w) nodes[i].w = textW;
    }
  });
}

function renderConnList() {
  const ul = document.getElementById('connList');
  if (links.length === 0) {
    ul.innerHTML = '<li style="color:#bbb">相関viewでリンクを結ぶと表示されます</li>';
    return;
  }
  ul.innerHTML = links.map(l => {
    const f = nodes[l.fromId], t = nodes[l.toId];
    if (!f || !t) return '';
    const marks = [l.invert ? '反転' : '', l.delay ? '遅延' : ''].filter(Boolean);
    return `<li>${f.id+1}. ${f.text||'(空)'} → ${t.id+1}. ${t.text||'(空)'}${marks.length ? ' <span style="color:#c07050">['+marks.join('・')+']</span>' : ''}</li>`;
  }).filter(Boolean).join('');
}

function copyConnText() {
  const text = links.map(l => {
    const f = nodes[l.fromId], t = nodes[l.toId];
    if (!f || !t) return '';
    const marks = [l.invert ? '反転' : '', l.delay ? '遅延' : ''].filter(Boolean);
    return `${f.id+1}. ${f.text} → ${t.id+1}. ${t.text}${marks.length ? ' ['+marks.join('・')+']' : ''}`;
  }).filter(Boolean).join('\n');
  navigator.clipboard.writeText(text);
}

// =====================================================
// CORRELATION VIEW CANVAS
// =====================================================
const corrCanvas = document.getElementById('corrCanvas');
const cc = corrCanvas.getContext('2d');

function resizeCorrCanvas() {
  const wrap = document.getElementById('corrWrap');
  corrCanvas.width  = wrap.clientWidth;
  corrCanvas.height = wrap.clientHeight;
}

const HANDLE_R  = 6;
const CORNER_R  = 10;
const EP_HIT_R  = 10; // link endpoint hit radius

function nodeHandles(n) {
  return {
    top:    { x: n.x + n.w / 2, y: n.y },
    right:  { x: n.x + n.w,     y: n.y + n.h / 2 },
    bottom: { x: n.x + n.w / 2, y: n.y + n.h },
    left:   { x: n.x,           y: n.y + n.h / 2 },
  };
}

function getLinkEndpoints(lk) {
  const fn = nodes[lk.fromId], tn = nodes[lk.toId];
  if (!fn || !tn) return null;
  return { fp: nodeHandles(fn)[lk.fromSide], tp: nodeHandles(tn)[lk.toSide] };
}

// ---- DRAW ----
function drawCorr() {
  cc.clearRect(0, 0, corrCanvas.width, corrCanvas.height);
  cc.fillStyle = '#fffdf9';
  cc.fillRect(0, 0, corrCanvas.width, corrCanvas.height);

  // Links (normal)
  links.forEach(lk => drawLinkOn(cc, lk, lk === ci.selLink || lk === ci.hoverLink));

  // Relink preview
  if (ci.relink) {
    const rl = ci.relink;
    const ep = getLinkEndpoints(rl.link);
    if (ep) {
      const fixed = rl.end === 'from' ? ep.tp : ep.fp;
      cc.save();
      cc.setLineDash([5, 4]);
      cc.strokeStyle = '#999';
      cc.lineWidth = 1.5;
      cc.beginPath();
      cc.moveTo(fixed.x, fixed.y);
      cc.lineTo(ci.mx, ci.my);
      cc.stroke();
      cc.restore();
    }
  }

  // Link draw preview
  if (ci.linkDraw && nodes[ci.linkDraw.fromId]) {
    const hn = nodeHandles(nodes[ci.linkDraw.fromId])[ci.linkDraw.fromSide];
    cc.save();
    cc.setLineDash([5, 4]);
    cc.strokeStyle = '#aaa';
    cc.lineWidth = 1.5;
    cc.beginPath();
    cc.moveTo(hn.x, hn.y); cc.lineTo(ci.linkDraw.mx, ci.linkDraw.my);
    cc.stroke();
    cc.restore();
  }

  // Nodes
  nodes.forEach(n => drawNodeOn(cc, n));

  // Node link-creation handles (●)
  if (!ci.relink) {
    nodes.forEach(n => {
      Object.values(nodeHandles(n)).forEach(h => {
        const hov = !ci.linkDraw && Math.hypot(h.x - ci.mx, h.y - ci.my) < HANDLE_R + 3;
        cc.beginPath();
        cc.arc(h.x, h.y, HANDLE_R - 1, 0, Math.PI * 2);
        cc.fillStyle = hov ? '#7c5c3e' : 'rgba(180,140,100,0.65)';
        cc.fill();
      });
    });
  }

  // Link endpoint handles (shown on hovered/selected link)
  const activeLk = ci.selLink || ci.hoverLink;
  if (activeLk && !ci.linkDraw && !ci.relink) {
    const ep = getLinkEndpoints(activeLk);
    if (ep) {
      [ep.fp, ep.tp].forEach(pt => {
        const near = Math.hypot(pt.x - ci.mx, pt.y - ci.my) < EP_HIT_R;
        cc.beginPath();
        cc.arc(pt.x, pt.y, 7, 0, Math.PI * 2);
        cc.fillStyle = near ? '#7c5c3e' : '#fff';
        cc.strokeStyle = '#8b4513';
        cc.lineWidth = 2;
        cc.fill();
        cc.stroke();
      });
    }
  }
}

function drawNodeOn(ctx, n) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.1)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;
  ctx.beginPath();
  rrect(ctx, n.x, n.y, n.w, n.h, CORNER_R);
  ctx.fillStyle = '#fff9f2';
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#c8a882';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#999';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(n.id + 1, n.x + 5, n.y + 4);

  ctx.fillStyle = '#222';
  ctx.font = '13px "Hiragino Sans","Meiryo",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.text || '', n.x + n.w / 2, n.y + n.h / 2, n.w - 20);

  // Resize grip
  ctx.fillStyle = '#c8a882';
  ctx.fillRect(n.x + n.w - 8, n.y + n.h - 8, 8, 8);
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawLinkOn(ctx, lk, hilight) {
  const ep = getLinkEndpoints(lk);
  if (!ep) return;
  const { fp, tp } = ep;

  ctx.save();
  ctx.strokeStyle = hilight ? '#6b3410' : '#a07850';
  ctx.lineWidth   = hilight ? 2.2 : 1.6;
  ctx.beginPath();
  ctx.moveTo(fp.x, fp.y);
  ctx.lineTo(tp.x, tp.y);
  ctx.stroke();

  // Arrowhead
  const angle = Math.atan2(tp.y - fp.y, tp.x - fp.x);
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(tp.x, tp.y);
  ctx.lineTo(tp.x - 13 * Math.cos(angle - 0.35), tp.y - 13 * Math.sin(angle - 0.35));
  ctx.lineTo(tp.x - 13 * Math.cos(angle + 0.35), tp.y - 13 * Math.sin(angle + 0.35));
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Marks at midpoint
  const mx = (fp.x + tp.x) / 2, my = (fp.y + tp.y) / 2;
  if (lk.invert) drawNotMark(ctx, mx,                    my, angle);
  if (lk.delay)  drawCapMark(ctx, mx + (lk.invert?22:0), my, angle);
}

function drawNotMark(ctx, x, y, angle) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.5;
  ctx.fillStyle = 'rgba(192,57,43,0.12)';
  ctx.beginPath();
  ctx.moveTo(-9, -7); ctx.lineTo(-9, 7); ctx.lineTo(2, 0); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(5, 0, 3, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function drawCapMark(ctx, x, y, angle) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  ctx.strokeStyle = '#2471a3'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-2, -8); ctx.lineTo(-2, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,  -8); ctx.lineTo(4,  8); ctx.stroke();
  ctx.restore();
}

// ---- HIT TESTING ----
function hitLink(mx, my) {
  for (let i = links.length - 1; i >= 0; i--) {
    const ep = getLinkEndpoints(links[i]);
    if (!ep) continue;
    if (distToSeg(mx, my, ep.fp.x, ep.fp.y, ep.tp.x, ep.tp.y) < 8) return links[i];
  }
  return null;
}

function distToSeg(px, py, ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay, len2 = dx*dx+dy*dy;
  if (!len2) return Math.hypot(px-ax, py-ay);
  const t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.hypot(px-ax-t*dx, py-ay-t*dy);
}

function ptInNode(n, x, y) { return x>=n.x && x<=n.x+n.w && y>=n.y && y<=n.y+n.h; }
function nearResize(n, x, y) { return Math.abs(x-(n.x+n.w))<10 && Math.abs(y-(n.y+n.h))<10; }

function nearHandle(n, x, y) {
  for (const [side, h] of Object.entries(nodeHandles(n))) {
    if (Math.hypot(x-h.x, y-h.y) < HANDLE_R + 2) return side;
  }
  return null;
}

function canvasXY(canvas, e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// ---- MOUSE EVENTS ----
corrCanvas.addEventListener('mousedown', e => {
  const { x, y } = canvasXY(corrCanvas, e);
  hideLinkPopup();

  // 1. Relink: grab link endpoint handle (only when a link is active/hovered)
  const activeLk = ci.selLink || ci.hoverLink;
  if (activeLk) {
    const ep = getLinkEndpoints(activeLk);
    if (ep) {
      if (Math.hypot(x-ep.fp.x, y-ep.fp.y) < EP_HIT_R) {
        ci.relink = { link: activeLk, end: 'from', mx: x, my: y };
        return;
      }
      if (Math.hypot(x-ep.tp.x, y-ep.tp.y) < EP_HIT_R) {
        ci.relink = { link: activeLk, end: 'to', mx: x, my: y };
        return;
      }
    }
  }

  // 2. Node handles (create new link)
  for (let i = nodes.length - 1; i >= 0; i--) {
    const side = nearHandle(nodes[i], x, y);
    if (side) { ci.linkDraw = { fromId: nodes[i].id, fromSide: side, mx: x, my: y }; return; }
  }

  // 3. Resize / Drag node
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (nearResize(n, x, y)) { ci.resize = { node: n, ox: x, oy: y, ow: n.w, oh: n.h }; return; }
    if (ptInNode(n, x, y))   { ci.drag   = { node: n, ox: x-n.x, oy: y-n.y }; ci.selLink = null; return; }
  }

  // 4. Click link
  const lk = hitLink(x, y);
  if (lk) { ci.selLink = lk; showLinkPopup(x, y); drawCorr(); return; }

  ci.selLink = null; drawCorr();
});

corrCanvas.addEventListener('mousemove', e => {
  const { x, y } = canvasXY(corrCanvas, e);
  ci.mx = x; ci.my = y;

  if (ci.drag)   { ci.drag.node.x = x-ci.drag.ox; ci.drag.node.y = y-ci.drag.oy; drawCorr(); return; }
  if (ci.resize) {
    ci.resize.node.w = Math.max(80, ci.resize.ow + x - ci.resize.ox);
    ci.resize.node.h = Math.max(36, ci.resize.oh + y - ci.resize.oy);
    drawCorr(); return;
  }
  if (ci.relink) { ci.relink.mx = x; ci.relink.my = y; drawCorr(); return; }
  if (ci.linkDraw) { ci.linkDraw.mx = x; ci.linkDraw.my = y; drawCorr(); return; }

  const hov = hitLink(x, y);
  if (hov !== ci.hoverLink) { ci.hoverLink = hov; drawCorr(); }

  // Cursor
  let cur = 'default';
  // Check active link's endpoint handles
  const alks = ci.selLink || ci.hoverLink;
  if (alks) {
    const ep = getLinkEndpoints(alks);
    if (ep && (Math.hypot(x-ep.fp.x,y-ep.fp.y)<EP_HIT_R || Math.hypot(x-ep.tp.x,y-ep.tp.y)<EP_HIT_R)) {
      cur = 'grab'; corrCanvas.style.cursor = cur; drawCorr(); return;
    }
  }
  for (const n of nodes) {
    if (nearHandle(n, x, y)) { cur = 'crosshair'; break; }
    if (nearResize(n, x, y)) { cur = 'se-resize'; break; }
    if (ptInNode(n, x, y))   { cur = 'move'; }
  }
  if (hov) cur = 'pointer';
  corrCanvas.style.cursor = cur;
  drawCorr();
});

corrCanvas.addEventListener('mouseup', e => {
  const { x, y } = canvasXY(corrCanvas, e);

  // Finish relink
  if (ci.relink) {
    const rl = ci.relink;
    ci.relink = null;
    for (const n of nodes) {
      if (n.id === (rl.end === 'from' ? rl.link.toId : rl.link.fromId)) continue;
      const side = nearHandle(n, x, y);
      if (side) {
        if (rl.end === 'from') { rl.link.fromId = n.id; rl.link.fromSide = side; }
        else                   { rl.link.toId   = n.id; rl.link.toSide   = side; }
        renderConnList();
        break;
      }
    }
    drawCorr(); return;
  }

  // Finish new link
  if (ci.linkDraw) {
    const dl = ci.linkDraw;
    ci.linkDraw = null;
    for (const n of nodes) {
      if (n.id === dl.fromId) continue;
      const side = nearHandle(n, x, y);
      if (side) {
        const dup = links.find(l => l.fromId===dl.fromId && l.toId===n.id && l.fromSide===dl.fromSide && l.toSide===side);
        if (!dup) {
          links.push({ id: uid++, fromId: dl.fromId, fromSide: dl.fromSide, toId: n.id, toSide: side, invert: false, delay: false });
          renderConnList();
        }
        break;
      }
    }
  }

  ci.drag = null; ci.resize = null;
  drawCorr();
});

corrCanvas.addEventListener('mouseleave', () => {
  ci.linkDraw = null; ci.drag = null; ci.resize = null; ci.relink = null;
  drawCorr();
});

function autoLayout() {
  if (!nodes.length) return;
  const cx = corrCanvas.width/2, cy = corrCanvas.height/2;
  const r  = Math.min(cx, cy) * 0.62;
  nodes.forEach((n, i) => {
    const a = (2*Math.PI*i/nodes.length) - Math.PI/2;
    n.x = cx + r*Math.cos(a) - n.w/2;
    n.y = cy + r*Math.sin(a) - n.h/2;
  });
  drawCorr();
}

// =====================================================
// CYCLE DETECTION
// =====================================================
function findCycles() {
  const n = nodes.length;
  if (!n) return [];
  const adj = Array.from({ length: n }, () => []);
  links.forEach(lk => {
    if (lk.fromId < n && lk.toId < n) adj[lk.fromId].push({ to: lk.toId, lk });
  });

  const found   = [];
  const onStack = new Array(n).fill(false);
  const path    = [], pathLinks = [];

  function dfs(start, cur) {
    for (const { to, lk } of adj[cur]) {
      pathLinks.push(lk);
      if (to === start && path.length >= 1) {
        const sig = [...path, start].sort().join(',');
        if (!found.some(c => [...c.nodeIds, c.nodeIds[0]].sort().join(',') === sig)) {
          found.push({ nodeIds: [...path], links: [...pathLinks] });
        }
      } else if (to > start && !onStack[to]) {
        onStack[to] = true; path.push(to);
        dfs(start, to);
        path.pop(); onStack[to] = false;
      }
      pathLinks.pop();
    }
  }

  for (let i = 0; i < n; i++) {
    onStack[i] = true; path.push(i);
    dfs(i, i);
    path.pop(); onStack[i] = false;
  }
  return found;
}

const chainBase = document.getElementById('chainBaseCanvas');

function drawChainBase() {

function drawChainEdit() {
  cec.clearRect(0, 0, chainEdit.width, chainEdit.height);

}

function drawLoop(ctx, lp, selected) {
  const { cx, cy, radius, thickness, startAngle, color, isReinforcing } = lp;
  const endAngle = startAngle + Math.PI * 2 - 0.18;

  ctx.save();
  ctx.globalAlpha  = lp.faint ? 0.1 : 0.65;
  ctx.strokeStyle  = color;
  ctx.lineWidth    = thickness;
  ctx.lineCap      = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy, radius, startAngle, endAngle);
  ctx.stroke();
  ctx.globalAlpha = lp.faint ? 0.1 : 1;

  // Arrowhead at end of arc (clockwise tangent direction at endAngle)
  // tangent = (-sin(θ), cos(θ)) for clockwise canvas arc
  const ax = cx + radius * Math.cos(endAngle);
  const ay = cy + radius * Math.sin(endAngle);
  const arrowDir = Math.atan2(Math.cos(endAngle), -Math.sin(endAngle));
  const as = thickness * 0.7;
  ctx.fillStyle = color.replace('0.4', '0.85');
  ctx.beginPath();
  ctx.moveTo(ax + as*Math.cos(arrowDir),       ay + as*Math.sin(arrowDir));
  ctx.lineTo(ax + as*Math.cos(arrowDir+2.4),   ay + as*Math.sin(arrowDir+2.4));
  ctx.lineTo(ax + as*Math.cos(arrowDir-2.4),   ay + as*Math.sin(arrowDir-2.4));
  ctx.closePath();
  ctx.fill();

  // Label
  ctx.font = `bold ${Math.max(16, Math.round(thickness*0.65))}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = color.replace('0.4', '0.9');
  ctx.fillText(isReinforcing ? 'R' : 'B', cx, cy);

  if (selected) {
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2; ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(cx, cy, radius + thickness/2 + 10, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawAnnot(ctx, a, selected) {
  ctx.save();
  ctx.font = '13px "Hiragino Sans","Meiryo",sans-serif';
  const tw = ctx.measureText(a.text).width;
  const pw = tw + 20, ph = 30;
  ctx.fillStyle   = selected ? 'rgba(255,248,200,0.95)' : 'rgba(255,255,255,0.9)';
  ctx.strokeStyle = selected ? '#d4a020' : '#c8a882';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  rrect(ctx, a.x, a.y, pw, ph, 6);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#333'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(a.text, a.x + 10, a.y + ph/2);
  ctx.restore();
  a._w = pw; a._h = ph;
}

function analyzeLoops() {
  const cycles = findCycles();
  let wi = 0, ci2 = 0;

  loops = cycles.map((cycle, i) => {
    const inv = cycle.links.filter(l => l.invert).length;
    const isR = (inv % 2 === 0);
    const cArr = isR ? WARM : COOL;
    const color = isR ? cArr[wi++ % cArr.length] : cArr[ci2++ % cArr.length];

    const loopNodes = cycle.nodeIds.map(id => nodes[id]).filter(Boolean);
    let cx = 0, cy = 0;
    loopNodes.forEach(n => { cx += n.x + n.w/2; cy += n.y + n.h/2; });
    cx /= loopNodes.length; cy /= loopNodes.length;

    // ★ Inner radius: fit inside the ring of nodes
    let minDistToCenter = Infinity;
    loopNodes.forEach(n => {
      const d = Math.hypot(n.x+n.w/2-cx, n.y+n.h/2-cy);
      minDistToCenter = Math.min(minDistToCenter, d);
    });
    const radius = Math.max(35, minDistToCenter * 0.55);

    return {
      id: uid++, nodeIds: cycle.nodeIds,
      isReinforcing: isR, color,
      cx, cy,
      radius,
      thickness: 20,
      startAngle: -Math.PI/2 + i * 0.3,
    };
  });

  drawChainEdit();

  const msg = loops.length === 0
    ? '閉じた環（ループ）は検出されませんでした。\nノード間に循環するリンクを作成してください。'
    : `${loops.length}個のループを検出しました。\n　強化ループ (R): ${loops.filter(l=>l.isReinforcing).length}\n　均衡ループ (B): ${loops.filter(l=>!l.isReinforcing).length}`;
  alert(msg);
}

chainEdit.addEventListener('mousedown', e => {
  const { x, y } = canvasXY(chainEdit, e);
  hideAnnotPopup();

  // Annotations
  for (let i = annots.length-1; i >= 0; i--) {
    const a = annots[i];
    if (a._w && x>=a.x && x<=a.x+a._w && y>=a.y && y<=a.y+a._h) {
      chi.selAnnot = a; chi.selLoop = null;
      chi.dragAnnot = { annot: a, ox: x-a.x, oy: y-a.y };
      showAnnotPopup(x, y); closeLoopPanel(); drawChainEdit(); return;
    }
  }

  // Loops (ring area)
  for (let i = loops.length-1; i >= 0; i--) {
    const lp = loops[i];
    const d  = Math.hypot(x-lp.cx, y-lp.cy);
    if (d >= lp.radius-lp.thickness/2-12 && d <= lp.radius+lp.thickness/2+12) {
      chi.selLoop = lp; chi.selAnnot = null;
      showLoopPanel(lp); hideAnnotPopup(); drawChainEdit(); return;
    }
  }

  chi.selLoop = null; chi.selAnnot = null;
  closeLoopPanel(); hideAnnotPopup(); drawChainEdit();
});

  document.getElementById('annotPopup').classList.remove('show');
}

function addAnnotation() {
  const text = prompt('テキストを入力:');
  if (!text) return;
  annots.push({ id: uid++, text, x: 60, y: 60 });
  drawChainEdit();
}

function deleteAnnotation() {
  if (!chi.selAnnot) return;
  annots = annots.filter(a => a !== chi.selAnnot);
  chi.selAnnot = null; hideAnnotPopup(); drawChainEdit();
}

function copyChainImg() {
  const merged = document.createElement('canvas');
  merged.width  = chainBase.width;
  merged.height = chainBase.height;
  const mc = merged.getContext('2d');
  mc.drawImage(chainBase, 0, 0);
  mc.drawImage(chainEdit,  0, 0);
  merged.toBlob(blob =>
    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]));
}

// =====================================================
// RESIZE
// =====================================================
window.addEventListener('resize', () => {
  if (document.getElementById('view-correlation').classList.contains('active')) {
    resizeCorrCanvas(); drawCorr();
  }
  if (document.getElementById('view-chain').classList.contains('active')) {
    resizeChainCanvas(); drawChainBase(); drawChainEdit();
  }
});

// =====================================================
// INIT
// =====================================================
updateLineNums();
</script>
</body>
</html>
