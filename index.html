<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>因果ループ図エディタ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans','Meiryo','Segoe UI',sans-serif; background: #f5f0eb; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.app-header { display: flex; align-items: center; gap: 8px; padding: 6px 16px; background: #2a1e15; flex-shrink: 0; }
.app-title { color: #d4b896; font-size: 14px; font-weight: 700; flex: 1; }
.hbtn { padding: 4px 13px; border: 1px solid #7c5c3e; border-radius: 5px; cursor: pointer; font-size: 12px; background: #3d2b1f; color: #d4b896; transition: all 0.15s; }
.hbtn:hover { background: #5a3e28; color: #fff; }
.hbtn.danger { border-color: #962d22; color: #f0a090; }
.hbtn.danger:hover { background: #6b1e15; }

.tabs { display: flex; background: #3d2b1f; padding: 0 16px; gap: 4px; align-items: flex-end; flex-shrink: 0; }
.tab { padding: 9px 22px; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 600; color: #bbb; background: #2a1e15; transition: all 0.2s; user-select: none; }
.tab.active { background: #f5f0eb; color: #3d2b1f; }
.tab:hover:not(.active) { background: #4a3525; color: #fff; }

.toolbar { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: #fff; border-bottom: 1px solid #e0d8d0; flex-shrink: 0; flex-wrap: wrap; }
.btn { padding: 5px 12px; border: 1px solid #d0c8c0; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 500; background: #f8f4f0; color: #444; transition: all 0.15s; white-space: nowrap; }
.btn:hover { background: #ede5dc; border-color: #b8a898; }
.btn.primary { background: #7c5c3e; color: #fff; border-color: #5a3e28; }
.btn.primary:hover { background: #5a3e28; }
.btn.active-state { background: #f0d8d0 !important; border-color: #c08070 !important; }
.sep { width: 1px; height: 22px; background: #ddd; margin: 0 3px; flex-shrink: 0; }
.hint { font-size: 11px; color: #999; margin-left: auto; }

.view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

/* Elements */
.editor-wrap { flex: 1; display: flex; overflow: hidden; }
.line-nums { width: 54px; background: #ede5dc; border-right: 2px solid #d4c4b4; padding: 8px 0; font-family: monospace; font-size: 12px; line-height: 22px; overflow: hidden; user-select: none; flex-shrink: 0; }
.line-nums .ln { height: 22px; text-align: right; padding-right: 6px; display: flex; align-items: center; justify-content: flex-end; gap: 2px; color: #a08060; }
.line-nums .ln.locked { background: #d8c8b8; color: #7c5030; }
.line-nums .ln.locked::before { content: '🔒'; font-size: 9px; }
.editor-ta { flex: 1; padding: 8px 12px; font-family: monospace; font-size: 13px; line-height: 22px; border: none; outline: none; resize: none; background: #fffdf9; color: #333; }
.lock-notice { padding: 5px 14px; background: #fef5e8; border-top: 1px solid #e8d4b0; font-size: 11px; color: #8b5e2a; display: none; flex-shrink: 0; }
.lock-notice.show { display: block; }
.conn-panel { border-top: 2px solid #c8a882; background: #faf5ee; padding: 8px 14px; max-height: 160px; overflow-y: auto; flex-shrink: 0; }
.conn-panel-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.conn-panel h3 { font-size: 12px; color: #7c5c3e; font-weight: 700; }
.conn-list { list-style: none; font-size: 12px; color: #555; line-height: 1.8; }

/* Canvas */
.canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #fffdf9; }
canvas { position: absolute; top: 0; left: 0; display: block; }

/* Popups */
.popup { position: absolute; background: #fff; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); padding: 5px; display: none; gap: 5px; z-index: 200; }
.popup.show { display: flex; }
.popup-btn { width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-size: 13px; background: #f8f4f0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.popup-btn:hover { background: #ede5dc; }
.popup-btn.del:hover { background: #f0d0d0; border-color: #c08080; }
.popup-btn.on { background: #fde8d8 !important; border-color: #e09060 !important; }

/* Loop panel */
.loop-panel { position: absolute; top: 12px; left: 12px; background: #fff; border: 1px solid #c8a882; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 14px; display: none; z-index: 200; width: 230px; }
.loop-panel.show { display: block; }
.loop-panel h4 { font-size: 13px; color: #5a3e28; margin-bottom: 8px; }
.loop-node-list { font-size: 11px; color: #555; line-height: 1.75; background: #faf5ee; border-radius: 5px; padding: 6px 8px; max-height: 110px; overflow-y: auto; margin-bottom: 8px; }
.loop-panel label { font-size: 11px; color: #888; display: block; margin-top: 6px; margin-bottom: 2px; }
.loop-panel input[type=range] { width: 100%; accent-color: #7c5c3e; }
.loop-btns { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
.loop-btns .btn { flex: 1; font-size: 11px; padding: 4px 6px; min-width: 0; }

/* Clear modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); z-index: 2000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: #fff; border-radius: 12px; padding: 28px 24px 20px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.modal-icon { font-size: 36px; margin-bottom: 10px; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: #888; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.modal-btns .hbtn { padding: 7px 16px; font-size: 13px; }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <div class="app-title">因果ループ図エディタ</div>
  <button class="hbtn" onclick="saveProject()">💾 保存</button>
  <button class="hbtn" onclick="document.getElementById('loadInput').click()">📂 ロード</button>
  <input type="file" id="loadInput" accept=".json" style="display:none" onchange="onLoadFile(this)">
  <button class="hbtn danger" onclick="showClearModal()">🗑 全てクリア</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-view="elements"     onclick="switchView('elements')">① 要素</div>
  <div class="tab"        data-view="correlation"  onclick="switchView('correlation')">② 相関</div>
  <div class="tab"        data-view="chain"        onclick="switchView('chain')">③ 連鎖</div>
</div>

<!-- ① 要素 -->
<div class="view active" id="view-elements">
  <div class="toolbar">
    <button class="btn" onclick="doUndo()">↩ 元に戻す</button>
    <button class="btn" onclick="doCopy()">コピー</button>
    <button class="btn" onclick="doPaste()">貼り付け</button>
    <div class="sep"></div>
    <button class="btn" onclick="deleteLine()">行削除</button>
    <button class="btn" onclick="moveLine(-1)">↑ 上へ</button>
    <button class="btn" onclick="moveLine(1)">↓ 下へ</button>
    <div class="sep"></div>
    <button class="btn primary" onclick="switchView('correlation')">相関へ →</button>
  </div>
  <div class="lock-notice" id="lockNotice">🔒 行1〜<span id="lockCount"></span> は固定済みです。新しい要素は末尾に追加してください。</div>
  <div class="editor-wrap">
    <div class="line-nums" id="lineNums"></div>
    <textarea class="editor-ta" id="editorTA" spellcheck="false"
      placeholder="要素を1行ずつ入力&#10;例：人口&#10;出生率&#10;食料資源"
      oninput="onEditorInput()" onscroll="syncLNScroll()"
      onkeydown="onEditorKeyDown(event)"></textarea>
  </div>
  <div class="conn-panel">
    <div class="conn-panel-hdr">
      <h3>接続情報</h3>
      <button class="btn" style="font-size:11px;padding:3px 9px" onclick="copyConnText()">📋 コピー</button>
    </div>
    <ul class="conn-list" id="connList"><li style="color:#bbb">相関viewでリンクを結ぶと表示されます</li></ul>
  </div>
</div>

<!-- ② 相関 -->
<div class="view" id="view-correlation">
  <div class="toolbar">
    <button class="btn" onclick="autoLayout()">⟳ 自動配置</button>
    <button class="btn" onclick="copyCanvasImg('corrCanvas')">🖼 画像コピー</button>
    <div class="sep"></div>
    <button class="btn primary" onclick="switchView('chain')">連鎖へ →</button>
    <span class="hint">移動: ドラッグ / リサイズ: 右下角 / リンク: ●からドラッグ / 付け替え: 矢印端●をドラッグ</span>
  </div>
  <div class="canvas-wrap" id="corrWrap">
    <canvas id="corrCanvas"></canvas>
    <div class="popup" id="linkPopup">
      <div class="popup-btn del" onclick="deleteLink()" title="削除">✕</div>
      <div class="popup-btn" id="invertBtn" onclick="toggleInvert()" title="反転">⊿○</div>
      <div class="popup-btn" id="delayBtn"  onclick="toggleDelay()"  title="遅延">⊣⊢</div>
    </div>
  </div>
</div>

<!-- ③ 連鎖 -->
<div class="view" id="view-chain">
  <div class="toolbar">
    <button class="btn primary" onclick="analyzeLoops()">🔍 自動解析</button>
    <button class="btn" onclick="addAnnotation()">✏ テキスト追加</button>
    <button class="btn" onclick="copyChainImg()">🖼 画像コピー</button>
    <span class="hint">強化(R)=暖色 / 均衡(B)=寒色 | ループ円をクリックで編集・ドラッグで移動</span>
  </div>
  <div class="canvas-wrap" id="chainWrap">
    <canvas id="chainBaseCanvas"></canvas>
    <canvas id="chainEditCanvas"></canvas>
    <div class="popup" id="annotPopup">
      <div class="popup-btn" onclick="editAnnotation()" title="テキスト編集">✎</div>
      <div class="popup-btn del" onclick="deleteAnnotation()" title="削除">✕</div>
    </div>
    <div class="loop-panel" id="loopPanel">
      <h4 id="loopPanelTitle">ループ</h4>
      <div class="loop-node-list" id="loopNodeList"></div>
      <label>サイズ（半径）</label>
      <input type="range" id="sizeSlider"  min="20" max="500" oninput="updateLoopParam('radius',this.value)">
      <label>太さ</label>
      <input type="range" id="thickSlider" min="4"  max="80"  oninput="updateLoopParam('thickness',this.value)">
      <div class="loop-btns">
        <button class="btn" id="faintBtn"  onclick="toggleLoopFaint()">👻 薄く</button>
        <button class="btn" onclick="resetLoopPos()">⊙ 内接円</button>
        <button class="btn" onclick="closeLoopPanel()">✕ 閉じる</button>
      </div>
    </div>
  </div>
</div>

<!-- Clear modal -->
<div class="modal-overlay" id="clearModal">
  <div class="modal-box">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">全てのデータをクリアします</div>
    <div class="modal-sub">この操作は元に戻せません。</div>
    <div class="modal-btns">
      <button class="hbtn" style="background:#7c5c3e;color:#fff;border-color:#5a3e28" onclick="clearAction('save')">💾 保存してから消去</button>
      <button class="hbtn danger" onclick="clearAction('clear')">🗑 消去</button>
      <button class="hbtn" onclick="clearAction('cancel')">キャンセル</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let nodes  = [];
let links  = [];
let loops  = [];
let annots = [];
let uid = 1;

let hist = [''], histIdx = 0;
let lockedCount = 0, prevLineCount = 0;

const ci = {
  drag: null, resize: null, linkDraw: null, relink: null,
  hoverLink: null, selLink: null, mx: 0, my: 0,
};
const chi = {
  selLoop: null, selAnnot: null,
  dragAnnot: null,
  loopDragIntent: null,  // {loop, ox, oy, startX, startY, moved}
  mx: 0, my: 0,
};

const WARM = ['rgba(210,70,20,0.42)','rgba(230,140,0,0.42)','rgba(200,50,50,0.42)','rgba(170,90,10,0.42)'];
const COOL = ['rgba(30,110,210,0.42)','rgba(20,160,180,0.42)','rgba(60,100,200,0.42)','rgba(0,140,120,0.42)'];

// ============================================================
// SAVE / LOAD / CLEAR
// ============================================================
function saveProject() {
  const name = prompt('ファイル名（.json は自動付与）:', 'causal-loop');
  if (!name) return;
  const data = {
    version: 2, editorText: ta.value, lockedCount,
    nodes:  nodes.map(n => ({...n})),
    links:  links.map(l => ({...l})),
    loops:  loops.map(l => { const c={...l}; delete c._linkObjs; return c; }),
    annots: annots.map(a => ({...a, _w:undefined, _h:undefined})),
    uid,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name.replace(/\.json$/i,'') + '.json'; a.click();
  URL.revokeObjectURL(url);
}

function onLoadFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      ta.value = d.editorText || '';
      lockedCount = d.lockedCount || 0;
      prevLineCount = ta.value.split('\n').length;
      nodes  = d.nodes  || [];
      links  = d.links  || [];
      loops  = d.loops  || [];
      annots = d.annots || [];
      uid    = d.uid    || uid;
      hist = [ta.value]; histIdx = 0;
      updateLN(); renderConnList(); updateLockNotice();
      alert('ロード: ' + file.name);
    } catch(err) { alert('読み込み失敗\n' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function showClearModal() {
  document.getElementById('clearModal').classList.add('show');
}
function clearAction(act) {
  document.getElementById('clearModal').classList.remove('show');
  if (act === 'cancel') return;
  if (act === 'save') saveProject();
  ta.value = ''; nodes = []; links = []; loops = []; annots = [];
  lockedCount = 0; prevLineCount = 0;
  hist = ['']; histIdx = 0; uid = 1;
  updateLN(); updateLockNotice(); renderConnList();
  [cc, cbc, cec].forEach(ctx => ctx.clearRect(0,0,9999,9999));
}

// ============================================================
// VIEW SWITCHING
// ============================================================
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`.tab[data-view="${name}"]`).classList.add('active');

  if (name === 'correlation') {
    if (lockedCount === 0 && ta.value.trim()) {
      lockedCount = ta.value.split('\n').length;
      prevLineCount = lockedCount;
      updateLockNotice();
    }
    syncEditorToNodes();
    requestAnimationFrame(() => { resizeCC(); drawCorr(); });
  } else if (name === 'chain') {
    syncEditorToNodes();
    requestAnimationFrame(() => { resizeChain(); drawChainBase(); drawChainEdit(); });
  } else {
    updateLN(); renderConnList();
  }
}

// ============================================================
// ELEMENTS VIEW
// ============================================================
const ta    = document.getElementById('editorTA');
const lnDiv = document.getElementById('lineNums');

function getLines() { return ta.value.split('\n'); }

function updateLN() {
  const lines = getLines();
  lnDiv.innerHTML = lines.map((_,i) =>
    `<div class="ln${lockedCount>0&&i<lockedCount?' locked':''}">${i+1}</div>`
  ).join('');
}

function updateLockNotice() {
  const el = document.getElementById('lockNotice');
  if (lockedCount > 0) {
    el.classList.add('show');
    document.getElementById('lockCount').textContent = lockedCount + '行';
  } else {
    el.classList.remove('show');
  }
}

function syncLNScroll() { lnDiv.scrollTop = ta.scrollTop; }

function onEditorInput() {
  const lines = getLines(), newCount = lines.length;
  if (lockedCount > 0 && newCount !== prevLineCount) {
    const cursorLine = ta.value.slice(0,ta.selectionStart).split('\n').length - 1;
    if (cursorLine < lockedCount) {
      const ok = confirm('末尾に行を追加してください。\n途中に行を追加・削除した場合、相関viewの接続関係はリセットします。\n\nOK → 接続をリセットして続行\nキャンセル → 変更を元に戻す');
      if (ok) {
        links = []; loops = []; lockedCount = newCount; updateLockNotice();
      } else {
        ta.value = hist[histIdx]; updateLN(); return;
      }
    }
  }
  prevLineCount = newCount;
  updateLN(); pushHist(); syncEditorToNodes(); renderConnList();
}

function pushHist() {
  hist = hist.slice(0, histIdx+1); hist.push(ta.value); histIdx++;
  if (hist.length > 100) { hist.shift(); histIdx--; }
}

function doUndo() {
  if (histIdx > 0) { histIdx--; ta.value = hist[histIdx]; prevLineCount = ta.value.split('\n').length; updateLN(); syncEditorToNodes(); renderConnList(); }
}
function doCopy() { const s=ta.selectionStart,e=ta.selectionEnd; navigator.clipboard.writeText(s!==e?ta.value.slice(s,e):ta.value); }
async function doPaste() { const t=await navigator.clipboard.readText(); const s=ta.selectionStart,e=ta.selectionEnd; ta.value=ta.value.slice(0,s)+t+ta.value.slice(e); ta.selectionStart=ta.selectionEnd=s+t.length; onEditorInput(); }
function getSelLine() { return ta.value.slice(0,ta.selectionStart).split('\n').length-1; }

function deleteLine() {
  const lines=getLines(), idx=getSelLine();
  if (lockedCount>0&&idx<lockedCount) { alert('固定済みの行は削除できません。'); return; }
  remapDel(idx);
  if (lines.length===1) ta.value=''; else { lines.splice(idx,1); ta.value=lines.join('\n'); }
  prevLineCount=ta.value.split('\n').length; pushHist(); updateLN(); syncEditorToNodes(); renderConnList();
}

function moveLine(dir) {
  const lines=getLines(), idx=getSelLine(), tgt=idx+dir;
  if (tgt<0||tgt>=lines.length) return;
  if (lockedCount>0&&(idx<lockedCount||tgt<lockedCount)) { alert('固定済みの行は移動できません。'); return; }
  [lines[idx],lines[tgt]]=[lines[tgt],lines[idx]]; remapSwap(idx,tgt);
  ta.value=lines.join('\n'); prevLineCount=ta.value.split('\n').length;
  pushHist(); updateLN(); syncEditorToNodes(); renderConnList();
}

function remapDel(di) {
  links=links.filter(l=>l.fromId!==di&&l.toId!==di);
  links.forEach(l=>{ if(l.fromId>di)l.fromId--; if(l.toId>di)l.toId--; });
}
function remapSwap(a,b) {
  links.forEach(l=>{
    if(l.fromId===a)l.fromId=b; else if(l.fromId===b)l.fromId=a;
    if(l.toId===a)l.toId=b;     else if(l.toId===b)l.toId=a;
  });
}

function onEditorKeyDown(e) {
  const mod = e.ctrlKey||e.metaKey;
  if (mod&&e.key==='z') { e.preventDefault(); doUndo(); }
  if (mod&&e.key==='c') { e.preventDefault(); doCopy(); }
  if (mod&&e.key==='v') { e.preventDefault(); doPaste(); }
  if (e.key==='Tab') { e.preventDefault(); const s=ta.selectionStart; ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(ta.selectionEnd); ta.selectionStart=ta.selectionEnd=s+2; onEditorInput(); }
}

function syncEditorToNodes() {
  const lines = ta.value.split('\n'), nc = lines.length;
  if (nodes.length > nc) { links=links.filter(l=>l.fromId<nc&&l.toId<nc); nodes.length=nc; }
  lines.forEach((line,i) => {
    const tw = Math.max(100, line.length*13+28);
    if (!nodes[i]) nodes[i] = { id:i, text:line, x:80+(i%4)*200, y:80+Math.floor(i/4)*130, w:tw, h:46 };
    else { nodes[i].text=line; nodes[i].id=i; if(tw>nodes[i].w) nodes[i].w=tw; }
  });
}

function renderConnList() {
  const ul = document.getElementById('connList');
  if (!links.length) { ul.innerHTML='<li style="color:#bbb">相関viewでリンクを結ぶと表示されます</li>'; return; }
  ul.innerHTML = links.map(l => {
    const f=nodes[l.fromId], t=nodes[l.toId]; if(!f||!t) return '';
    const m=[l.invert?'反転':'',l.delay?'遅延':''].filter(Boolean);
    return `<li>${f.id+1}. ${f.text||'(空)'} → ${t.id+1}. ${t.text||'(空)'}${m.length?' <span style="color:#c07050">['+m.join('・')+']</span>':''}</li>`;
  }).filter(Boolean).join('');
}
function copyConnText() {
  navigator.clipboard.writeText(links.map(l=>{ const f=nodes[l.fromId],t=nodes[l.toId]; if(!f||!t)return''; const m=[l.invert?'反転':'',l.delay?'遅延':''].filter(Boolean); return `${f.id+1}. ${f.text} → ${t.id+1}. ${t.text}${m.length?' ['+m.join('・')+']':''}`; }).filter(Boolean).join('\n'));
}

// ============================================================
// CORRELATION CANVAS
// ============================================================
const corrCanvas = document.getElementById('corrCanvas');
const cc = corrCanvas.getContext('2d');

function resizeCC() {
  const w = document.getElementById('corrWrap');
  corrCanvas.width = w.clientWidth; corrCanvas.height = w.clientHeight;
}

const HANDLE_R = 5;
const CORNER_R = 10;
const EP_R = 10;

// 8 handles per node
function nodeHandles(n) {
  return {
    'top-left':      {x: n.x+n.w*0.25, y: n.y},
    'top-center':    {x: n.x+n.w*0.5,  y: n.y},
    'top-right':     {x: n.x+n.w*0.75, y: n.y},
    'left':          {x: n.x,          y: n.y+n.h*0.5},
    'right':         {x: n.x+n.w,      y: n.y+n.h*0.5},
    'bottom-left':   {x: n.x+n.w*0.25, y: n.y+n.h},
    'bottom-center': {x: n.x+n.w*0.5,  y: n.y+n.h},
    'bottom-right':  {x: n.x+n.w*0.75, y: n.y+n.h},
  };
}

// Backward-compat alias for old side names from saved files
function getHandle(n, side) {
  const hs = nodeHandles(n);
  const alias = {top:'top-center', bottom:'bottom-center', left:'left', right:'right'};
  return hs[side] || hs[alias[side]] || hs['top-center'];
}

function getLinkEP(lk) {
  const fn=nodes[lk.fromId], tn=nodes[lk.toId]; if(!fn||!tn) return null;
  return { fp: getHandle(fn,lk.fromSide), tp: getHandle(tn,lk.toSide) };
}

// Auto-reroute links when node moves
function rerouteNode(nodeId) {
  const node = nodes[nodeId]; if (!node) return;
  const fromLks = links.filter(l => l.fromId===nodeId);
  const toLks   = links.filter(l => l.toId===nodeId);

  function assign(lkSet, isFrom) {
    const used = new Set();
    const hs = nodeHandles(node);
    const ncx = node.x+node.w/2, ncy = node.y+node.h/2;
    // Sort links: shortest distance from fixed endpoint to node center first
    lkSet.sort((a,b) => {
      const fa = isFrom ? getHandle(nodes[a.toId], a.toSide)   : getHandle(nodes[a.fromId], a.fromSide);
      const fb = isFrom ? getHandle(nodes[b.toId], b.toSide)   : getHandle(nodes[b.fromId], b.fromSide);
      return Math.hypot((fa||{x:0}).x-ncx,(fa||{x:0,y:0}).y-ncy) - Math.hypot((fb||{x:0}).x-ncx,(fb||{x:0,y:0}).y-ncy);
    });
    for (const lk of lkSet) {
      const otherId   = isFrom ? lk.toId : lk.fromId;
      const otherSide = isFrom ? lk.toSide : lk.fromSide;
      const other = nodes[otherId];
      const fixed = other ? getHandle(other, otherSide) : {x:ncx, y:ncy};
      const sorted = Object.entries(hs).sort((a,b) =>
        Math.hypot(a[1].x-fixed.x,a[1].y-fixed.y) - Math.hypot(b[1].x-fixed.x,b[1].y-fixed.y)
      );
      const best = sorted.find(([s]) => !used.has(s)) || sorted[0];
      used.add(best[0]);
      if (isFrom) lk.fromSide = best[0];
      else        lk.toSide   = best[0];
    }
  }
  assign(fromLks, true);
  assign(toLks,   false);
}

function nearHandle(n, x, y) {
  for (const [side,h] of Object.entries(nodeHandles(n)))
    if (Math.hypot(x-h.x, y-h.y) < HANDLE_R+3) return side;
  return null;
}

function ptIn(n,x,y)  { return x>=n.x&&x<=n.x+n.w&&y>=n.y&&y<=n.y+n.h; }
function nearSE(n,x,y){ return Math.abs(x-(n.x+n.w))<10&&Math.abs(y-(n.y+n.h))<10; }

function xy(canvas, e) {
  const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top};
}

// DRAW
function drawCorr() {
  cc.clearRect(0,0,corrCanvas.width,corrCanvas.height);
  cc.fillStyle='#fffdf9'; cc.fillRect(0,0,corrCanvas.width,corrCanvas.height);
  links.forEach(lk => drawLink(cc,lk,lk===ci.selLink||lk===ci.hoverLink));

  if (ci.relink) {
    const ep=getLinkEP(ci.relink.link);
    if (ep) {
      const fixed = ci.relink.end==='from' ? ep.tp : ep.fp;
      cc.save(); cc.setLineDash([5,4]); cc.strokeStyle='#aaa'; cc.lineWidth=1.5;
      cc.beginPath(); cc.moveTo(fixed.x,fixed.y); cc.lineTo(ci.mx,ci.my); cc.stroke(); cc.restore();
    }
  }
  if (ci.linkDraw && nodes[ci.linkDraw.fromId]) {
    const h=nodeHandles(nodes[ci.linkDraw.fromId])[ci.linkDraw.fromSide];
    cc.save(); cc.setLineDash([5,4]); cc.strokeStyle='#aaa'; cc.lineWidth=1.5;
    cc.beginPath(); cc.moveTo(h.x,h.y); cc.lineTo(ci.linkDraw.mx,ci.linkDraw.my); cc.stroke(); cc.restore();
  }

  nodes.forEach(n => drawNode(cc,n));

  // Link-creation handles (● on each node)
  if (!ci.relink) {
    nodes.forEach(n => Object.values(nodeHandles(n)).forEach(h => {
      const hov = !ci.linkDraw && Math.hypot(h.x-ci.mx,h.y-ci.my)<HANDLE_R+3;
      cc.beginPath(); cc.arc(h.x,h.y,HANDLE_R-1,0,Math.PI*2);
      cc.fillStyle = hov?'#7c5c3e':'rgba(180,140,100,0.6)'; cc.fill();
    }));
  }

  // Endpoint handles on hovered/selected link
  const alks = ci.selLink||ci.hoverLink;
  if (alks && !ci.linkDraw && !ci.relink) {
    const ep=getLinkEP(alks);
    if (ep) [ep.fp,ep.tp].forEach(pt => {
      const near = Math.hypot(pt.x-ci.mx,pt.y-ci.my)<EP_R;
      cc.beginPath(); cc.arc(pt.x,pt.y,7,0,Math.PI*2);
      cc.fillStyle=near?'#7c5c3e':'#fff'; cc.strokeStyle='#8b4513'; cc.lineWidth=2; cc.fill(); cc.stroke();
    });
  }
}

function drawNode(ctx,n) {
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.1)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
  ctx.beginPath(); rrect(ctx,n.x,n.y,n.w,n.h,CORNER_R);
  ctx.fillStyle='#fff9f2'; ctx.fill();
  ctx.shadowBlur=0; ctx.strokeStyle='#c8a882'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#999'; ctx.font='10px monospace'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(n.id+1, n.x+5, n.y+4);
  ctx.fillStyle='#222'; ctx.font='13px "Hiragino Sans","Meiryo",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(n.text||'', n.x+n.w/2, n.y+n.h/2, n.w-20);
  ctx.fillStyle='#c8a882'; ctx.fillRect(n.x+n.w-8,n.y+n.h-8,8,8);
}

function rrect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawLink(ctx,lk,hi) {
  const ep=getLinkEP(lk); if(!ep) return;
  const {fp,tp}=ep;
  ctx.save();
  ctx.strokeStyle=hi?'#6b3410':'#a07850'; ctx.lineWidth=hi?2.2:1.6;
  ctx.beginPath(); ctx.moveTo(fp.x,fp.y); ctx.lineTo(tp.x,tp.y); ctx.stroke();
  const ang=Math.atan2(tp.y-fp.y,tp.x-fp.x);
  ctx.fillStyle=ctx.strokeStyle;
  ctx.beginPath(); ctx.moveTo(tp.x,tp.y);
  ctx.lineTo(tp.x-13*Math.cos(ang-0.35),tp.y-13*Math.sin(ang-0.35));
  ctx.lineTo(tp.x-13*Math.cos(ang+0.35),tp.y-13*Math.sin(ang+0.35));
  ctx.closePath(); ctx.fill();
  ctx.restore();
  const mx=(fp.x+tp.x)/2, my=(fp.y+tp.y)/2;
  if(lk.invert) drawNOT(ctx,mx,my,ang);
  if(lk.delay)  drawCap(ctx,mx+(lk.invert?22:0),my,ang);
}

function drawNOT(ctx,x,y,a) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(a);
  ctx.strokeStyle='#c0392b'; ctx.lineWidth=1.5; ctx.fillStyle='rgba(192,57,43,0.12)';
  ctx.beginPath(); ctx.moveTo(-9,-7); ctx.lineTo(-9,7); ctx.lineTo(2,0); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(5,0,3,0,Math.PI*2); ctx.stroke(); ctx.restore();
}
function drawCap(ctx,x,y,a) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(a); ctx.strokeStyle='#2471a3'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-2,-8); ctx.lineTo(-2,8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,-8);  ctx.lineTo(4,8);  ctx.stroke(); ctx.restore();
}

function hitLink(mx,my) {
  for (let i=links.length-1;i>=0;i--) {
    const ep=getLinkEP(links[i]); if(!ep) continue;
    if (d2seg(mx,my,ep.fp.x,ep.fp.y,ep.tp.x,ep.tp.y)<8) return links[i];
  }
  return null;
}
function d2seg(px,py,ax,ay,bx,by) {
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(!l2) return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-ax-t*dx,py-ay-t*dy);
}

// MOUSE
corrCanvas.addEventListener('mousedown', e => {
  const {x,y}=xy(corrCanvas,e); hideLinkPopup();
  const alks=ci.selLink||ci.hoverLink;
  if (alks) {
    const ep=getLinkEP(alks);
    if (ep) {
      if (Math.hypot(x-ep.fp.x,y-ep.fp.y)<EP_R) { ci.relink={link:alks,end:'from',mx:x,my:y}; return; }
      if (Math.hypot(x-ep.tp.x,y-ep.tp.y)<EP_R) { ci.relink={link:alks,end:'to',  mx:x,my:y}; return; }
    }
  }
  for (let i=nodes.length-1;i>=0;i--) {
    const n=nodes[i], s=nearHandle(n,x,y);
    if (s) { ci.linkDraw={fromId:n.id,fromSide:s,mx:x,my:y}; return; }
  }
  for (let i=nodes.length-1;i>=0;i--) {
    const n=nodes[i];
    if (nearSE(n,x,y)) { ci.resize={node:n,ox:x,oy:y,ow:n.w,oh:n.h}; return; }
    if (ptIn(n,x,y))   { ci.drag={node:n,ox:x-n.x,oy:y-n.y}; ci.selLink=null; return; }
  }
  const lk=hitLink(x,y);
  if (lk) { ci.selLink=lk; showLinkPopup(x,y); drawCorr(); return; }
  ci.selLink=null; drawCorr();
});

corrCanvas.addEventListener('mousemove', e => {
  const {x,y}=xy(corrCanvas,e); ci.mx=x; ci.my=y;
  if (ci.drag) {
    ci.drag.node.x=x-ci.drag.ox; ci.drag.node.y=y-ci.drag.oy;
    rerouteNode(ci.drag.node.id); drawCorr(); return;
  }
  if (ci.resize) {
    ci.resize.node.w=Math.max(80,ci.resize.ow+x-ci.resize.ox);
    ci.resize.node.h=Math.max(36,ci.resize.oh+y-ci.resize.oy);
    drawCorr(); return;
  }
  if (ci.relink)   { ci.relink.mx=x;   ci.relink.my=y;   drawCorr(); return; }
  if (ci.linkDraw) { ci.linkDraw.mx=x; ci.linkDraw.my=y; drawCorr(); return; }
  const hov=hitLink(x,y);
  if (hov!==ci.hoverLink) { ci.hoverLink=hov; drawCorr(); }
  // cursor
  let cur='default';
  const al=ci.selLink||ci.hoverLink;
  if (al) { const ep=getLinkEP(al); if(ep&&(Math.hypot(x-ep.fp.x,y-ep.fp.y)<EP_R||Math.hypot(x-ep.tp.x,y-ep.tp.y)<EP_R)) cur='grab'; }
  for (const n of nodes) {
    if (nearHandle(n,x,y)) { cur='crosshair'; break; }
    if (nearSE(n,x,y))     { cur='se-resize'; break; }
    if (ptIn(n,x,y))       { cur='move'; }
  }
  if (hov) cur='pointer';
  corrCanvas.style.cursor=cur; drawCorr();
});

corrCanvas.addEventListener('mouseup', e => {
  const {x,y}=xy(corrCanvas,e);
  if (ci.relink) {
    const rl=ci.relink; ci.relink=null;
    for (const n of nodes) {
      if (n.id===(rl.end==='from'?rl.link.toId:rl.link.fromId)) continue;
      const s=nearHandle(n,x,y);
      if (s) { if(rl.end==='from'){rl.link.fromId=n.id;rl.link.fromSide=s;}else{rl.link.toId=n.id;rl.link.toSide=s;} renderConnList(); break; }
    }
    drawCorr(); return;
  }
  if (ci.linkDraw) {
    const dl=ci.linkDraw; ci.linkDraw=null;
    for (const n of nodes) {
      if (n.id===dl.fromId) continue;
      const s=nearHandle(n,x,y);
      if (s) {
        if (!links.find(l=>l.fromId===dl.fromId&&l.toId===n.id&&l.fromSide===dl.fromSide&&l.toSide===s))
          links.push({id:uid++,fromId:dl.fromId,fromSide:dl.fromSide,toId:n.id,toSide:s,invert:false,delay:false});
        renderConnList(); break;
      }
    }
  }
  ci.drag=null; ci.resize=null; drawCorr();
});

corrCanvas.addEventListener('mouseleave', () => { ci.linkDraw=null; ci.drag=null; ci.resize=null; ci.relink=null; drawCorr(); });

function showLinkPopup(x,y) {
  const p=document.getElementById('linkPopup'); p.style.left=x+'px'; p.style.top=(y-50)+'px'; p.classList.add('show');
  document.getElementById('invertBtn').classList.toggle('on',!!(ci.selLink&&ci.selLink.invert));
  document.getElementById('delayBtn').classList.toggle('on',!!(ci.selLink&&ci.selLink.delay));
}
function hideLinkPopup() { document.getElementById('linkPopup').classList.remove('show'); }
function deleteLink()   { if(!ci.selLink)return; links=links.filter(l=>l!==ci.selLink); ci.selLink=null; hideLinkPopup(); drawCorr(); renderConnList(); }
function toggleInvert() { if(!ci.selLink)return; ci.selLink.invert=!ci.selLink.invert; document.getElementById('invertBtn').classList.toggle('on',ci.selLink.invert); drawCorr(); renderConnList(); }
function toggleDelay()  { if(!ci.selLink)return; ci.selLink.delay =!ci.selLink.delay;  document.getElementById('delayBtn').classList.toggle('on',ci.selLink.delay);  drawCorr(); renderConnList(); }

function autoLayout() {
  if(!nodes.length)return;
  const cx=corrCanvas.width/2, cy=corrCanvas.height/2, r=Math.min(cx,cy)*0.62;
  nodes.forEach((n,i)=>{ const a=(2*Math.PI*i/nodes.length)-Math.PI/2; n.x=cx+r*Math.cos(a)-n.w/2; n.y=cy+r*Math.sin(a)-n.h/2; });
  drawCorr();
}
function copyCanvasImg(id) { document.getElementById(id).toBlob(b=>navigator.clipboard.write([new ClipboardItem({'image/png':b})])); }

// ============================================================
// CYCLE DETECTION
// ============================================================
function findCycles() {
  const n=nodes.length; if(!n)return[];
  const adj=Array.from({length:n},()=>[]);
  links.forEach(lk=>{ if(lk.fromId<n&&lk.toId<n) adj[lk.fromId].push({to:lk.toId,lk}); });
  const found=[], onStack=new Array(n).fill(false), path=[], pathLinks=[];
  function dfs(start,cur) {
    for(const {to,lk} of adj[cur]) {
      pathLinks.push(lk);
      if(to===start&&path.length>=1) {
        const sig=[...path,start].sort().join(',');
        if(!found.some(c=>[...c.nodeIds,c.nodeIds[0]].sort().join(',')===sig))
          found.push({nodeIds:[...path],links:[...pathLinks]});
      } else if(to>start&&!onStack[to]) {
        onStack[to]=true; path.push(to); dfs(start,to); path.pop(); onStack[to]=false;
      }
      pathLinks.pop();
    }
  }
  for(let i=0;i<n;i++){onStack[i]=true;path.push(i);dfs(i,i);path.pop();onStack[i]=false;}
  return found;
}

// ============================================================
// CHAIN CANVAS
// ============================================================
const chainBase=document.getElementById('chainBaseCanvas');
const chainEdit=document.getElementById('chainEditCanvas');
const cbc=chainBase.getContext('2d');
const cec=chainEdit.getContext('2d');

function resizeChain() {
  const w=document.getElementById('chainWrap');
  chainBase.width=chainEdit.width=w.clientWidth;
  chainBase.height=chainEdit.height=w.clientHeight;
}

function drawChainBase() {
  cbc.clearRect(0,0,chainBase.width,chainBase.height);
  cbc.fillStyle='#fffdf9'; cbc.fillRect(0,0,chainBase.width,chainBase.height);
  links.forEach(lk=>drawLink(cbc,lk,false));
  nodes.forEach(n =>drawNode(cbc,n));
}

function drawChainEdit() {
  cec.clearRect(0,0,chainEdit.width,chainEdit.height);
  if (chi.selLoop) drawLoopHighlight(cec, chi.selLoop);
  loops.forEach(lp=>drawLoop(cec,lp,lp===chi.selLoop));
  annots.forEach(a =>drawAnnot(cec,a,a===chi.selAnnot));
}

// Glow highlight for selected loop's nodes + links
function drawLoopHighlight(ctx, lp) {
  const col = lp.color.replace('0.42','0.9');
  const loopNodes = lp.nodeIds.map(id=>nodes[id]).filter(Boolean);
  const loopLinks = (lp.loopLinkIds||[]).map(id=>links.find(l=>l.id===id)).filter(Boolean);

  // Node halos
  loopNodes.forEach(n => {
    ctx.save();
    ctx.shadowColor=col; ctx.shadowBlur=28;
    ctx.globalAlpha=0.45;
    ctx.fillStyle=lp.color.replace('0.42','0.25');
    ctx.beginPath(); rrect(ctx,n.x-5,n.y-5,n.w+10,n.h+10,CORNER_R+5); ctx.fill();
    ctx.restore();
  });

  // Link halos
  loopLinks.forEach(lk => {
    const ep=getLinkEP(lk); if(!ep) return;
    ctx.save();
    ctx.shadowColor=col; ctx.shadowBlur=18;
    ctx.globalAlpha=0.55;
    ctx.strokeStyle=lp.color.replace('0.42','0.7');
    ctx.lineWidth=6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(ep.fp.x,ep.fp.y); ctx.lineTo(ep.tp.x,ep.tp.y); ctx.stroke();
    ctx.restore();
  });
}

function drawLoop(ctx, lp, selected) {
  const {cx,cy,radius,thickness,startAngle,color,isReinforcing} = lp;
  const endAngle = startAngle + Math.PI*2 - 0.18;
  ctx.save();
  ctx.globalAlpha  = lp.faint ? 0.1 : 0.65;
  ctx.strokeStyle  = color; ctx.lineWidth=thickness; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(cx,cy,radius,startAngle,endAngle); ctx.stroke();
  ctx.globalAlpha  = lp.faint ? 0.1 : 1;
  // arrowhead
  const ax=cx+radius*Math.cos(endAngle), ay=cy+radius*Math.sin(endAngle);
  const ad=Math.atan2(Math.cos(endAngle),-Math.sin(endAngle));
  const as=thickness*0.7;
  ctx.fillStyle=color.replace('0.42','0.85');
  ctx.beginPath();
  ctx.moveTo(ax+as*Math.cos(ad),ay+as*Math.sin(ad));
  ctx.lineTo(ax+as*Math.cos(ad+2.4),ay+as*Math.sin(ad+2.4));
  ctx.lineTo(ax+as*Math.cos(ad-2.4),ay+as*Math.sin(ad-2.4));
  ctx.closePath(); ctx.fill();
  // label
  ctx.font=`bold ${Math.max(16,Math.round(thickness*0.65))}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=color.replace('0.42','0.9');
  ctx.fillText(isReinforcing?'R':'B', cx,cy);
  if (selected) {
    ctx.setLineDash([6,4]); ctx.strokeStyle='#555'; ctx.lineWidth=2; ctx.globalAlpha=0.8;
    ctx.beginPath(); ctx.arc(cx,cy,radius+thickness/2+10,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawAnnot(ctx, a, selected) {
  ctx.save();
  ctx.font='13px "Hiragino Sans","Meiryo",sans-serif';
  const lines=a.text.split('\n'), lineH=18;
  const maxW=Math.max(...lines.map(l=>ctx.measureText(l).width||10));
  const pw=maxW+20, ph=lines.length*lineH+12;
  ctx.fillStyle=selected?'rgba(255,248,190,0.97)':'rgba(255,255,230,0.88)';
  ctx.beginPath(); rrect(ctx,a.x,a.y,pw,ph,6); ctx.fill();
  // no stroke
  ctx.fillStyle='#333'; ctx.textAlign='left'; ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l, a.x+10, a.y+6+i*lineH));
  ctx.restore();
  a._w=pw; a._h=ph;
}

function analyzeLoops() {
  const cycles=findCycles(); let wi=0, ci2=0;
  loops=cycles.map((cycle,i)=>{
    const inv=cycle.links.filter(l=>l.invert).length, isR=(inv%2===0);
    const cArr=isR?WARM:COOL, color=isR?cArr[wi++%cArr.length]:cArr[ci2++%cArr.length];
    const ln=cycle.nodeIds.map(id=>nodes[id]).filter(Boolean);
    let cx=0,cy=0; ln.forEach(n=>{cx+=n.x+n.w/2;cy+=n.y+n.h/2;}); cx/=ln.length;cy/=ln.length;
    let minD=Infinity; ln.forEach(n=>minD=Math.min(minD,Math.hypot(n.x+n.w/2-cx,n.y+n.h/2-cy)));
    const radius=Math.max(35,minD*0.55);
    return {
      id:uid++, nodeIds:cycle.nodeIds,
      loopLinkIds: cycle.links.map(l=>l.id),
      isReinforcing:isR, color,
      cx, cy, origCx:cx, origCy:cy,
      radius, thickness:20, startAngle:-Math.PI/2+i*0.3, faint:false,
    };
  });
  drawChainEdit();
  alert(loops.length===0
    ?'閉じた環（ループ）は検出されませんでした。'
    :`${loops.length}個のループを検出しました。\n　強化ループ (R): ${loops.filter(l=>l.isReinforcing).length}\n　均衡ループ (B): ${loops.filter(l=>!l.isReinforcing).length}`);
}

// CHAIN INTERACTION
chainEdit.addEventListener('mousedown', e => {
  const {x,y}=xy(chainEdit,e); hideAnnotPopup();

  // Annotations first
  for (let i=annots.length-1;i>=0;i--) {
    const a=annots[i];
    if(a._w&&x>=a.x&&x<=a.x+a._w&&y>=a.y&&y<=a.y+a._h) {
      chi.selAnnot=a; chi.selLoop=null;
      chi.dragAnnot={annot:a,ox:x-a.x,oy:y-a.y};
      showAnnotPopup(x,y); closeLoopPanel(); drawChainEdit(); return;
    }
  }

  // Loops: use drag-intent pattern (click vs drag determined on mouseup)
  for (let i=loops.length-1;i>=0;i--) {
    const lp=loops[i], d=Math.hypot(x-lp.cx,y-lp.cy);
    const inRing   = d>=lp.radius-lp.thickness/2-14 && d<=lp.radius+lp.thickness/2+14;
    const inCenter = d<Math.max(25, lp.thickness*0.6);
    if (inRing||inCenter) {
      chi.loopDragIntent={loop:lp,ox:x-lp.cx,oy:y-lp.cy,startX:x,startY:y,moved:false};
      return;
    }
  }

  chi.selLoop=null; chi.selAnnot=null; closeLoopPanel(); hideAnnotPopup(); drawChainEdit();
});

chainEdit.addEventListener('mousemove', e => {
  const {x,y}=xy(chainEdit,e);
  if (chi.dragAnnot) {
    chi.dragAnnot.annot.x=x-chi.dragAnnot.ox; chi.dragAnnot.annot.y=y-chi.dragAnnot.oy;
    drawChainEdit(); return;
  }
  if (chi.loopDragIntent) {
    const di=chi.loopDragIntent;
    if (!di.moved && Math.hypot(x-di.startX,y-di.startY)>5) di.moved=true;
    if (di.moved) { di.loop.cx=x-di.ox; di.loop.cy=y-di.oy; drawChainEdit(); }
    return;
  }
  // cursor hint
  let cur='default';
  for (const lp of loops) {
    const d=Math.hypot(x-lp.cx,y-lp.cy);
    if (d>=lp.radius-lp.thickness/2-14&&d<=lp.radius+lp.thickness/2+14) { cur='grab'; break; }
    if (d<25) { cur='move'; break; }
  }
  for (const a of annots) if(a._w&&x>=a.x&&x<=a.x+a._w&&y>=a.y&&y<=a.y+a._h) { cur='move'; break; }
  chainEdit.style.cursor=cur;
});

chainEdit.addEventListener('mouseup', e => {
  if (chi.dragAnnot) { chi.dragAnnot=null; return; }
  if (chi.loopDragIntent) {
    const di=chi.loopDragIntent; chi.loopDragIntent=null;
    if (!di.moved) {
      // Click → select and show panel
      chi.selLoop=di.loop; chi.selAnnot=null;
      showLoopPanel(di.loop); drawChainEdit();
    }
    return;
  }
});

function showLoopPanel(lp) {
  document.getElementById('loopPanelTitle').textContent = lp.isReinforcing?'強化ループ (R)':'均衡ループ (B)';
  document.getElementById('sizeSlider').value  = lp.radius;
  document.getElementById('thickSlider').value = lp.thickness;
  // Node list with loop order
  const html = lp.nodeIds.map((id,i) => {
    const n=nodes[id], label=n?`${n.id+1}. ${n.text||'(空)'}`:`#${id+1}`;
    const arr = i<lp.nodeIds.length-1 ? '&nbsp;→' : '&nbsp;→&nbsp;<span style="color:#aaa">①</span>';
    return `<span style="white-space:nowrap">&#${9312+i}; ${label}${arr}</span>`;
  }).join('<br>');
  document.getElementById('loopNodeList').innerHTML = html;
  document.getElementById('faintBtn').classList.toggle('active-state', !!lp.faint);
  document.getElementById('loopPanel').classList.add('show');
}

function closeLoopPanel() { document.getElementById('loopPanel').classList.remove('show'); chi.selLoop=null; drawChainEdit(); }

function updateLoopParam(key,val) { if(chi.selLoop){chi.selLoop[key]=parseFloat(val);drawChainEdit();} }

function toggleLoopFaint() {
  if(!chi.selLoop)return; chi.selLoop.faint=!chi.selLoop.faint;
  document.getElementById('faintBtn').classList.toggle('active-state',chi.selLoop.faint); drawChainEdit();
}

function resetLoopPos() {
  if(!chi.selLoop)return;
  chi.selLoop.cx=chi.selLoop.origCx; chi.selLoop.cy=chi.selLoop.origCy;
  document.getElementById('sizeSlider').value=chi.selLoop.radius; drawChainEdit();
}

function showAnnotPopup(x,y) { const p=document.getElementById('annotPopup'); p.style.left=x+'px'; p.style.top=(y-50)+'px'; p.classList.add('show'); }
function hideAnnotPopup() { document.getElementById('annotPopup').classList.remove('show'); }

function addAnnotation() {
  const text=prompt('テキストを入力（Shift+Enterで改行）:'); if(!text)return;
  annots.push({id:uid++, text, x:60, y:60}); drawChainEdit();
}

let _editDone=false;
function editAnnotation() {
  if(!chi.selAnnot)return;
  const a=chi.selAnnot; hideAnnotPopup();
  const rect=chainEdit.getBoundingClientRect();
  const ta2=document.createElement('textarea');
  const pw=Math.max(140,a._w||140), ph=Math.max(50,a._h||50);
  ta2.style.cssText=`position:fixed;left:${rect.left+a.x}px;top:${rect.top+a.y}px;width:${pw}px;min-height:${ph}px;font:13px 'Hiragino Sans','Meiryo',sans-serif;line-height:1.5;padding:5px 8px;border:2px solid #7c5c3e;border-radius:5px;background:rgba(255,250,210,0.98);z-index:999;resize:both;outline:none;`;
  ta2.value=a.text; document.body.appendChild(ta2); ta2.focus(); ta2.select(); _editDone=false;
  function finish(save) { if(_editDone)return; _editDone=true; if(save)a.text=ta2.value; if(document.body.contains(ta2))document.body.removeChild(ta2); drawChainEdit(); }
  ta2.addEventListener('keydown',ev=>{ if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();finish(true);} if(ev.key==='Escape')finish(false); });
  ta2.addEventListener('blur',()=>finish(true));
}

function deleteAnnotation() { if(!chi.selAnnot)return; annots=annots.filter(a=>a!==chi.selAnnot); chi.selAnnot=null; hideAnnotPopup(); drawChainEdit(); }

function copyChainImg() {
  const m=document.createElement('canvas'); m.width=chainBase.width; m.height=chainBase.height;
  const mc=m.getContext('2d'); mc.drawImage(chainBase,0,0); mc.drawImage(chainEdit,0,0);
  m.toBlob(b=>navigator.clipboard.write([new ClipboardItem({'image/png':b})]));
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize',()=>{
  if(document.getElementById('view-correlation').classList.contains('active')){resizeCC();drawCorr();}
  if(document.getElementById('view-chain').classList.contains('active')){resizeChain();drawChainBase();drawChainEdit();}
});

// ============================================================
// INIT
// ============================================================
updateLN();
</script>
